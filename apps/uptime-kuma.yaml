apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uptime-kuma
  template:
    metadata:
      labels:
        app: uptime-kuma
    spec:
      nodeSelector:
        kubernetes.io/hostname: one61
      containers:
      - name: uptime-kuma
        image: louislam/uptime-kuma:1
        ports:
        - containerPort: 3001
        volumeMounts:
        - name: kuma-data
          mountPath: /app/data
        resources:
          requests:
            memory: 128Mi
          limits:
            memory: 256Mi
      volumes:
      - name: kuma-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.100.205"
spec:
  type: LoadBalancer
  selector:
    app: uptime-kuma
  ports:
  - port: 80
    targetPort: 3001
